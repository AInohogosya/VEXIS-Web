<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXIS Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    :root {
      --primary: #0084ff;
      --primary-dark: #0066cc;
      --primary-light: #e6f3ff;
      --secondary: #10b981;
      --background: #f0f2f5;
      --surface: #ffffff;
      --surface-light: #f8f9fa;
      --surface-hover: #f1f3f4;
      --text-primary: #1f2937;
      --text-secondary: #657786;
      --text-muted: #8b95a5;
      --border: #e4e6eb;
      --border-light: #f0f2f5;
      --error: #dc3545;
      --success: #10b981;
      --warning: #ff9800;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.24);
      --shadow-lg: 0 4px 6px rgba(0, 0, 0, 0.07), 0 1px 3px rgba(0, 0, 0, 0.06);
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 20px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--background); 
      color: var(--text-primary); 
      height: 100dvh; 
      display: flex; 
      flex-direction: column;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--surface-light);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
    
    /* Header Styles */
    #header { 
      padding: 16px 20px; 
      background: var(--surface); 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      box-shadow: var(--shadow);
    }
    
    #header-left { 
      display: flex; 
      align-items: center; 
      gap: 12px;
    }
    
    #header-left span {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    #header-left span::before {
      content: '🤖';
      font-size: 20px;
    }
    
    #header button {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }
    
    #header button:hover {
      border-color: var(--error);
      color: var(--error);
      background: rgba(220, 53, 69, 0.1);
    }
    
    #lang-selector { 
      background: var(--surface-hover); 
      color: var(--text-primary); 
      border: 1px solid var(--border); 
      padding: 8px 12px; 
      border-radius: var(--radius); 
      font-size: 14px; 
      cursor: pointer; 
      outline: none;
      transition: var(--transition);
      font-weight: 500;
    }
    
    #lang-selector:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    #lang-selector option { 
      background: var(--surface); 
      color: var(--text-primary); 
    }
    
    /* Messages Container */
    #messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 16px 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px;
      scroll-behavior: smooth;
      background: var(--background);
    }
    
    /* Message Bubbles */
    .msg { 
      max-width: 65%; 
      padding: 10px 14px; 
      border-radius: var(--radius-xl); 
      line-height: 1.4; 
      word-break: break-word;
      font-size: 14px;
      box-shadow: var(--shadow);
      animation: messageSlide 0.3s ease-out;
      position: relative;
      transition: var(--transition);
    }
    
    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .user { 
      align-self: flex-end; 
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-bottom-right-radius: 4px;
      border: none;
    }
    
    .agent { 
      align-self: flex-start; 
      background: var(--surface);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    
    .msg:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }
    
    /* Input Area */
    #input-area { 
      padding: 16px 20px; 
      background: var(--surface); 
      border-top: 1px solid var(--border);
      display: flex; 
      gap: 12px;
    }
    
    #input { 
      flex: 1; 
      padding: 12px 16px; 
      border-radius: var(--radius-lg); 
      border: 1px solid var(--border); 
      background: var(--surface-light); 
      color: var(--text-primary); 
      font-size: 14px; 
      outline: none;
      transition: var(--transition);
      font-family: inherit;
    }
    
    #input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.1);
    }
    
    #input::placeholder {
      color: var(--text-muted);
    }
    
    #send { 
      padding: 12px 20px; 
      border-radius: var(--radius-lg); 
      border: none; 
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
      color: white; 
      font-size: 14px; 
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    #send:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }
    
    #send:active {
      transform: translateY(0);
    }
    
    #send::before {
      content: '➤';
      font-size: 12px;
    }
    
    #send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Login Screen */
    #login-screen { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100dvh; 
      gap: 32px;
      padding: 24px;
      background: var(--background);
    }
    
    #login-screen h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      text-align: center;
    }
    
    #login-form { 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
      width: 100%;
      max-width: 360px;
      padding: 32px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }
    
    #login-form input { 
      padding: 14px 16px; 
      border-radius: var(--radius); 
      border: 1px solid var(--border); 
      background: var(--surface-light); 
      color: var(--text-primary); 
      font-size: 15px; 
      outline: none;
      transition: var(--transition);
      font-family: inherit;
    }
    
    #login-form input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.1);
    }
    
    #login-form input::placeholder {
      color: var(--text-muted);
    }
    
    #login-form button { 
      padding: 14px 20px; 
      border-radius: var(--radius); 
      border: none; 
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
      color: white; 
      font-size: 15px; 
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    
    #login-form button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }
    
    #login-form button:active {
      transform: translateY(0);
    }
    
    #register-btn {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-primary) !important;
    }
    
    #register-btn:hover {
      background: var(--surface-hover) !important;
    }
    
    #forgot-password { 
      color: var(--text-secondary); 
      font-size: 14px; 
      cursor: pointer; 
      text-align: center;
      transition: var(--transition);
      margin-top: 8px;
    }
    
    #forgot-password:hover {
      color: var(--primary);
    }
    
    #error-msg { 
      color: var(--error); 
      font-size: 14px; 
      text-align: center; 
      min-height: 20px;
      font-weight: 500;
    }
    
    /* Logout Button */
    #header button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }
    
    #header button:hover {
      border-color: var(--error);
      color: var(--error);
      background: rgba(239, 68, 68, 0.1);
    }
    
    /* Responsive Design */
    @media (max-width: 640px) {
      #header {
        padding: 8px 16px;
      }
      
      .chat-details h2 {
        font-size: 14px;
      }
      
      .chat-details p {
        font-size: 12px;
      }
      
      .avatar {
        width: 36px;
        height: 36px;
        font-size: 14px;
      }
      
      #messages {
        padding: 12px 16px;
      }
      
      .msg {
        max-width: 80%;
        font-size: 13px;
        padding: 8px 12px;
      }
      
      #input-area {
        padding: 12px 16px;
      }
      
      #input {
        font-size: 13px;
        padding: 10px 14px;
      }
      
      .attach-btn, #send {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      
      #login-form {
        padding: 24px;
        max-width: 340px;
      }
      
      .logo {
        width: 64px;
        height: 64px;
        font-size: 28px;
      }
      
      #login-screen h1 {
        font-size: 24px;
      }
      
      #login-screen p {
        font-size: 14px;
      }
    }
    
    /* Loading Animation */
    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s infinite ease-in-out;
    }
    
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    
    /* Message Timestamps */
    .message-timestamp {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0.7;
      font-weight: 400;
    }
    
    .user .message-timestamp {
      text-align: right;
      color: rgba(255, 255, 255, 0.7);
    }
    
    /* Typing Indicator Wrapper */
    .typing-indicator-wrapper {
      padding: 8px 12px !important;
      min-width: 60px;
    }
    
    /* Enhanced Message Interactions */
    .msg:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
      transition: var(--transition);
    }
    
    /* Message Status Indicators */
    .message-status {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
    }
    
    .user .message-status {
      color: rgba(255, 255, 255, 0.7);
    }
    
    /* Improved Focus States */
    button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    
    input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    
    /* Enhanced Loading States */
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top: 2px solid currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Success/Error States */
    .success {
      background: var(--success) !important;
      border-color: var(--success) !important;
      color: white !important;
    }
    
    .error {
      background: var(--error) !important;
      border-color: var(--error) !important;
      color: white !important;
    }
    
    /* Pulse Animation for New Messages */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 132, 255, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(0, 132, 255, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(0, 132, 255, 0);
      }
    }
    
    .new-message {
      animation: pulse 2s;
    }
    
    /* Smooth Transitions */
    * {
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>VEXIS Chat</h1>
  <div id="login-form">
    <input id="email-input" type="email" data-i18n-placeholder="emailPlaceholder" placeholder="メールアドレス" />
    <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholder" placeholder="パスワード" />
    <button id="login-btn" data-i18n="login">ログイン</button>
    <button id="register-btn" data-i18n="register">新規登録</button>
    <div id="forgot-password" onclick="showForgotPassword()">Forgot your password?</div>
    <div id="error-msg"></div>
  </div>
</div>

<div id="chat-screen" style="display:none; flex-direction:column; height:100dvh;">
  <div id="header">
    <div id="header-left">
      <span>VEXIS Agent</span>
      <select id="lang-selector">
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
    </div>
    <button onclick="logout()" data-i18n="logout">ログアウト</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" data-i18n-placeholder="messagePlaceholder" placeholder="メッセージを入力..." />
    <button id="send" data-i18n="send">送信</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const translations = {
    en: {
      login: "Login",
      register: "Register",
      logout: "Logout",
      send: "Send",
      emailPlaceholder: "Email address",
      passwordPlaceholder: "Password",
      messagePlaceholder: "Type a message...",
      loginError: "Login failed",
      registerError: "Registration failed: ",
      forgotPassword: "Forgot your password?"
    },
    ja: {
      login: "ログイン",
      register: "新規登録",
      logout: "ログアウト",
      send: "送信",
      emailPlaceholder: "メールアドレス",
      passwordPlaceholder: "パスワード",
      messagePlaceholder: "メッセージを入力...",
      loginError: "ログインに失敗しました",
      registerError: "登録に失敗しました：",
      forgotPassword: "パスワードを忘れた方"
    },
    zh: {
      login: "登录",
      register: "注册",
      logout: "登出",
      send: "发送",
      emailPlaceholder: "电子邮箱",
      passwordPlaceholder: "密码",
      messagePlaceholder: "输入消息...",
      loginError: "登录失败",
      registerError: "注册失败：",
      forgotPassword: "忘记密码？"
    }
  };

  let currentLang = 'en';
  let unsubscribe = null;

  function detectBrowserLanguage() {
    const browserLang = navigator.language || navigator.userLanguage;
    const langCode = browserLang.toLowerCase().split('-')[0];
    if (langCode === 'ja') return 'ja';
    if (langCode === 'zh') return 'zh';
    return 'en';
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'zh' ? 'zh' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang][key]) {
        el.textContent = translations[lang][key];
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (translations[lang][key]) {
        el.placeholder = translations[lang][key];
      }
    });
    const langSelector = document.getElementById('lang-selector');
    if (langSelector) langSelector.value = lang;
    const forgotPassword = document.getElementById('forgot-password');
    if (forgotPassword) forgotPassword.textContent = translations[lang].forgotPassword;
  }

  const firebaseConfig = {
    apiKey: "AIzaSyCgBfSlqZXwraxuxFAxZKG0GXHv-XP7umE",
    authDomain: "vexis-cli-remote-f6f4c.firebaseapp.com",
    projectId: "vexis-cli-remote-f6f4c",
    storageBucket: "vexis-cli-remote-f6f4c.firebasestorage.app",
    messagingSenderId: "420034681058",
    appId: "1:420034681058:web:86f601782961cf5d12e6bb"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUid = null;

  const initialLang = detectBrowserLanguage();
  setLanguage(initialLang);

  document.getElementById('lang-selector').addEventListener('change', (e) => {
    setLanguage(e.target.value);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      listenMessages();
    } else {
      currentUid = null;
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("chat-screen").style.display = "none";
      if (unsubscribe) unsubscribe();
    }
  });

  document.getElementById("login-btn").onclick = async () => {
    const email = document.getElementById("email-input").value;
    const password = document.getElementById("password-input").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      document.getElementById("error-msg").textContent = "";
    } catch (e) {
      document.getElementById("error-msg").textContent = translations[currentLang].loginError;
    }
  };

  document.getElementById("register-btn").onclick = async () => {
    const email = document.getElementById("email-input").value;
    const password = document.getElementById("password-input").value;
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      document.getElementById("error-msg").textContent = "";
    } catch (e) {
      document.getElementById("error-msg").textContent = translations[currentLang].registerError + e.message;
    }
  };

  window.showForgotPassword = function() {
    const messages = {
      en: "We're sorry, but it's currently not possible to reset your password. Please wait for future updates or try using a new email address.",
      ja: "申し訳ありませんが、現在パスワードのリセットはできません。今後のアップデートをお待ちいただくか、新しいメールアドレスをご利用ください。",
      zh: "很抱歉，目前无法重置密码。请等待未来更新或尝试使用新的电子邮箱地址。"
    };
    const msg = messages[currentLang] || messages.en;
    const popup = window.open("", "forgotPassword", "width=500,height=200,left=" + (window.screenX + 100) + ",top=" + (window.screenY + 100));
    popup.document.write(`
      <!DOCTYPE html>
      <html lang="${currentLang}">
      <head>
        <meta charset="UTF-8">
        <title>Password Reset</title>
        <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: sans-serif; background: #111; color: #eee; padding: 30px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
          .message { text-align: center; line-height: 1.6; font-size: 16px; }
        </style>
      </head>
      <body>
        <div class="message">${msg}</div>
      </body>
      </html>
    `);
  };

  window.logout = () => signOut(auth);

  document.getElementById("send").onclick = sendMessage;
  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();
    
    if (!text || !currentUid) return;
    
    // Clear input and show loading state
    input.value = "";
    sendBtn.classList.add("loading");
    sendBtn.disabled = true;
    
    try {
      await addDoc(collection(db, `conversations/${currentUid}/messages`), {
        role: "user",
        content: text,
        timestamp: serverTimestamp(),
        read: false
      });
      
      // Show typing indicator for agent response
      setTimeout(() => showTypingIndicator(), 500);
      
      // Hide typing indicator after a delay (simulating agent response)
      setTimeout(() => hideTypingIndicator(), 3000);
      
    } catch (error) {
      console.error("Error sending message:", error);
      // Show error state briefly
      sendBtn.classList.add("error");
      setTimeout(() => {
        sendBtn.classList.remove("error");
      }, 1000);
    } finally {
      // Reset button state
      sendBtn.classList.remove("loading");
      sendBtn.disabled = false;
    }
  }

  function listenMessages() {
    const q = query(
      collection(db, `conversations/${currentUid}/messages`),
      orderBy("timestamp", "asc")
    );
    unsubscribe = onSnapshot(q, (snapshot) => {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${data.role === "user" ? "user" : "agent"}`;
        
        // Create message content wrapper
        const contentWrapper = document.createElement("div");
        contentWrapper.textContent = data.content;
        
        // Create timestamp
        const timestamp = document.createElement("div");
        timestamp.className = "message-timestamp";
        const time = data.timestamp?.toDate();
        if (time) {
          timestamp.textContent = formatTime(time);
        }
        
        msgDiv.appendChild(contentWrapper);
        msgDiv.appendChild(timestamp);
        container.appendChild(msgDiv);
      });
      
      container.scrollTop = container.scrollHeight;
    });
  }
  
  function formatTime(date) {
    const hours = date.getHours().toString().padStart(2, '0');
    const minutes = date.getMinutes().toString().padStart(2, '0');
    return `${hours}:${minutes}`;
  }
  
  function showTypingIndicator() {
    const container = document.getElementById("messages");
    const typingDiv = document.createElement("div");
    typingDiv.className = "msg agent typing-indicator-wrapper";
    typingDiv.id = "typing-indicator";
    
    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    indicator.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    `;
    
    typingDiv.appendChild(indicator);
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
  }
  
  function hideTypingIndicator() {
    const indicator = document.getElementById("typing-indicator");
    if (indicator) {
      indicator.remove();
    }
  }
</script>
</body>
</html>
