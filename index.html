<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXIS Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; height: 100dvh; display: flex; flex-direction: column; }
    #header { padding: 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    #header-left { display: flex; align-items: center; gap: 12px; }
    #lang-selector { background: #222; color: #eee; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-size: 14px; cursor: pointer; outline: none; }
    #lang-selector option { background: #222; color: #eee; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; line-height: 1.5; word-break: break-word; }
    .user { align-self: flex-end; background: #2563eb; }
    .agent { align-self: flex-start; background: #2a2a2a; }
    #input-area { padding: 12px; background: #1a1a1a; display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #444; background: #222; color: #eee; font-size: 16px; outline: none; }
    #send { padding: 10px 20px; border-radius: 20px; border: none; background: #2563eb; color: white; font-size: 16px; cursor: pointer; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 20px; }
    #login-form { display: flex; flex-direction: column; gap: 12px; width: 280px; }
    #login-form input { padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #222; color: #eee; font-size: 16px; outline: none; }
    #login-form button { padding: 12px; border-radius: 8px; border: none; background: #2563eb; color: white; font-size: 16px; cursor: pointer; }
    #register-link { color: #888; font-size: 14px; cursor: pointer; text-align: center; }
    #register-link span { color: #2563eb; text-decoration: underline; cursor: pointer; }
    #error-msg { color: #f87171; font-size: 14px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>VEXIS Chat</h1>
  <div id="login-form">
    <input id="email-input" type="email" data-i18n-placeholder="emailPlaceholder" placeholder="メールアドレス" />
    <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholder" placeholder="パスワード" />
    <button id="login-btn" data-i18n="login">ログイン</button>
    <button id="register-btn" style="background:#333;" data-i18n="register">新規登録</button>
    <div id="error-msg"></div>
  </div>
  <div id="register-link"><span data-i18n="haveAccount">アカウントをお持ちの方は</span> <span onclick="showLogin()" data-i18n="login">ログイン</span></div>
</div>

<div id="chat-screen" style="display:none; flex-direction:column; height:100dvh;">
  <div id="header">
    <div id="header-left">
      <span>VEXIS Agent</span>
      <select id="lang-selector">
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
    </div>
    <button onclick="logout()" style="background:none;border:1px solid #555;color:#aaa;padding:6px 12px;border-radius:6px;cursor:pointer;" data-i18n="logout">ログアウト</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" data-i18n-placeholder="messagePlaceholder" placeholder="メッセージを入力..." />
    <button id="send" data-i18n="send">送信</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const translations = {
    en: {
      login: "Login",
      register: "Register",
      logout: "Logout",
      send: "Send",
      emailPlaceholder: "Email address",
      passwordPlaceholder: "Password",
      messagePlaceholder: "Type a message...",
      loginError: "Login failed",
      registerError: "Registration failed: ",
      haveAccount: "Already have an account?"
    },
    ja: {
      login: "ログイン",
      register: "新規登録",
      logout: "ログアウト",
      send: "送信",
      emailPlaceholder: "メールアドレス",
      passwordPlaceholder: "パスワード",
      messagePlaceholder: "メッセージを入力...",
      loginError: "ログインに失敗しました",
      registerError: "登録に失敗しました：",
      haveAccount: "アカウントをお持ちの方は"
    },
    zh: {
      login: "登录",
      register: "注册",
      logout: "登出",
      send: "发送",
      emailPlaceholder: "电子邮箱",
      passwordPlaceholder: "密码",
      messagePlaceholder: "输入消息...",
      loginError: "登录失败",
      registerError: "注册失败：",
      haveAccount: "已有账户？"
    }
  };

  let currentLang = 'en';

  function detectBrowserLanguage() {
    const browserLang = navigator.language || navigator.userLanguage;
    const langCode = browserLang.toLowerCase().split('-')[0];
    if (langCode === 'ja') return 'ja';
    if (langCode === 'zh') return 'zh';
    return 'en';
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'zh' ? 'zh' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang][key]) {
        el.textContent = translations[lang][key];
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (translations[lang][key]) {
        el.placeholder = translations[lang][key];
      }
    });
    const langSelector = document.getElementById('lang-selector');
    if (langSelector) langSelector.value = lang;
  }

  const firebaseConfig = {
    apiKey: "AIzaSyCgBfSlqZXwraxuxFAxZKG0GXHv-XP7umE",
    authDomain: "vexis-cli-remote-f6f4c.firebaseapp.com",
    projectId: "vexis-cli-remote-f6f4c",
    storageBucket: "vexis-cli-remote-f6f4c.firebasestorage.app",
    messagingSenderId: "420034681058",
    appId: "1:420034681058:web:86f601782961cf5d12e6bb"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUid = null;
  let unsubscribe = null;

  const initialLang = detectBrowserLanguage();
  setLanguage(initialLang);

  document.getElementById('lang-selector').addEventListener('change', (e) => {
    setLanguage(e.target.value);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      listenMessages();
    } else {
      currentUid = null;
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("chat-screen").style.display = "none";
      if (unsubscribe) unsubscribe();
    }
  });

  document.getElementById("login-btn").onclick = async () => {
    const email = document.getElementById("email-input").value;
    const password = document.getElementById("password-input").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      document.getElementById("error-msg").textContent = "";
    } catch (e) {
      document.getElementById("error-msg").textContent = translations[currentLang].loginError;
    }
  };

  document.getElementById("register-btn").onclick = async () => {
    const email = document.getElementById("email-input").value;
    const password = document.getElementById("password-input").value;
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      document.getElementById("error-msg").textContent = "";
    } catch (e) {
      document.getElementById("error-msg").textContent = translations[currentLang].registerError + e.message;
    }
  };

  window.logout = () => signOut(auth);

  document.getElementById("send").onclick = sendMessage;
  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || !currentUid) return;
    input.value = "";
    await addDoc(collection(db, `conversations/${currentUid}/messages`), {
      role: "user",
      content: text,
      timestamp: serverTimestamp(),
      read: false
    });
  }

  function listenMessages() {
    const q = query(
      collection(db, `conversations/${currentUid}/messages`),
      orderBy("timestamp", "asc")
    );
    unsubscribe = onSnapshot(q, (snapshot) => {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = `msg ${data.role === "user" ? "user" : "agent"}`;
        div.textContent = data.content;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }
</script>
</body>
</html>
