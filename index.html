<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXIS Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; height: 100dvh; display: flex; flex-direction: column; }
    #header { padding: 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    #header-left { display: flex; align-items: center; gap: 12px; }
    #lang-selector { background: #222; color: #eee; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-size: 14px; cursor: pointer; outline: none; }
    #lang-selector option { background: #222; color: #eee; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; line-height: 1.5; word-break: break-word; }
    .user { align-self: flex-end; background: #2563eb; }
    .agent { align-self: flex-start; background: #2a2a2a; }
    #input-area { padding: 12px; background: #1a1a1a; display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #444; background: #222; color: #eee; font-size: 16px; outline: none; }
    #send { padding: 10px 20px; border-radius: 20px; border: none; background: #2563eb; color: white; font-size: 16px; cursor: pointer; }
    #error-msg { color: #f87171; font-size: 14px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>

<div id="chat-screen" style="display:flex; flex-direction:column; height:100dvh;">
  <div id="header">
    <div id="header-left">
      <span>VEXIS Agent</span>
      <select id="lang-selector">
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" data-i18n-placeholder="messagePlaceholder" placeholder="メッセージを入力..." />
    <button id="send" data-i18n="send">送信</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const translations = {
    en: {
      send: "Send",
      messagePlaceholder: "Type a message..."
    },
    ja: {
      send: "送信",
      messagePlaceholder: "メッセージを入力..."
    },
    zh: {
      send: "发送",
      messagePlaceholder: "输入消息..."
    }
  };

  let currentLang = 'en';
  let unsubscribe = null;

  function detectBrowserLanguage() {
    const browserLang = navigator.language || navigator.userLanguage;
    const langCode = browserLang.toLowerCase().split('-')[0];
    if (langCode === 'ja') return 'ja';
    if (langCode === 'zh') return 'zh';
    return 'en';
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'zh' ? 'zh' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang][key]) {
        el.textContent = translations[lang][key];
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (translations[lang][key]) {
        el.placeholder = translations[lang][key];
      }
    });
    const langSelector = document.getElementById('lang-selector');
    if (langSelector) langSelector.value = lang;
  }

  const firebaseConfig = {
    apiKey: "AIzaSyCgBfSlqZXwraxuxFAxZKG0GXHv-XP7umE",
    authDomain: "vexis-cli-remote-f6f4c.firebaseapp.com",
    projectId: "vexis-cli-remote-f6f4c",
    storageBucket: "vexis-cli-remote-f6f4c.firebasestorage.app",
    messagingSenderId: "420034681058",
    appId: "1:420034681058:web:86f601782961cf5d12e6bb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const initialLang = detectBrowserLanguage();
  setLanguage(initialLang);

  document.getElementById('lang-selector').addEventListener('change', (e) => {
    setLanguage(e.target.value);
  });

  listenMessages();

  document.getElementById("send").onclick = sendMessage;
  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    await addDoc(collection(db, "conversations/anonymous/messages"), {
      role: "user",
      content: text,
      timestamp: serverTimestamp(),
      read: false
    });
  }

  function listenMessages() {
    const q = query(
      collection(db, "conversations/anonymous/messages"),
      orderBy("timestamp", "asc")
    );
    unsubscribe = onSnapshot(q, (snapshot) => {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = `msg ${data.role === "user" ? "user" : "agent"}`;
        div.textContent = data.content;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }
</script>
</body>
</html>
